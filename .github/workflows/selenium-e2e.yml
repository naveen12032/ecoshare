name: Selenium E2E Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Verify Chrome Installation
      run: google-chrome --version
        
    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium webdriver-manager pandas openpyxl

    - name: Start Local HTTP Server
      run: |
        npm install -g http-server
        npx http-server -p 3000 -c-1 &
        sleep 3

    - name: Execute Automated Selenium Test Suite
      run: |
        python run_e2e.py

    - name: Upload E2E Excel Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: EcoShare-E2E-Report
        path: E2E_Test_Report.xlsx
